# 项目相关配置
ruoyi:
  # 名称
  name: PortalService
  # 版本
  version: 3.9.2
  # 版权年份
  copyrightYear: 2026
  # 文件路径 示例（ Windows配置D:/ruoyi/uploadPath，Linux配置 /home/ruoyi/uploadPath）
  profile: C:/ruoyi/uploadPath
  # 获取ip地址开关
  addressEnabled: true

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8081（区别于admin的8080）
  port: 8081
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 100
    threads:
      # tomcat最大线程数（面向公网适当降低）
      max: 200
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 10
    # 最大连接数
    max-connections: 1000
    # 请求体最大大小（防大文件攻击）
    max-http-form-post-size: 1MB

# 日志配置
logging:
  level:
    com.ruoyi: info
    org.springframework: warn
    com.ruoyi.service.security: debug

# Spring配置
spring:
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: druid
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 5MB
      # 设置总上传的文件大小
      max-request-size: 10MB
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    # 空值不序列化
    default-property-inclusion: non_null
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: false
  data:
    # redis 配置
    redis:
      # 地址
      host: 192.168.0.69
      # 端口，默认为6379
      port: 6379
      # 数据库索引（使用独立的数据库，区别于admin的7）
      database: 8
      # 密码
      password: alp1q2w3e
      # 连接超时时间
      timeout: 10s
      lettuce:
        pool:
          # 连接池中的最小空闲连接
          min-idle: 0
          # 连接池中的最大空闲连接
          max-idle: 8
          # 连接池的最大数据库连接数
          max-active: 8
          # #连接池最大阻塞等待时间（使用负值表示没有限制）
          max-wait: -1ms

# 安全配置（门户服务专用）
security:
  # IP黑名单配置
  ip:
    blacklist:
      - 192.168.1.100
      - 10.0.0.*
    whitelist-enabled: false
  
  # 全局限流配置
  rate-limit:
    enabled: true
    default-limit: 100
    burst: 20
    
  # 攻击防护配置
  attack-prevention:
    enabled: true
    sql-injection: true
    xss: true
    csrf: false
    replay-attack: true

  # 接口签名配置（用于敏感操作验证）
  signature:
    # 签名密钥（生产环境建议使用环境变量：${SIGNATURE_SECRET}）
    secret: portal_service_secret_key_2026_secure
    # 是否启用签名验证（全局开关）
    enabled: true
    # 时间戳有效窗口（秒）
    timestamp-window: 300
    
  # CORS配置
  cors:
    allowed-origins:
      - http://localhost:*
      - http://127.0.0.1:*
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
    max-age: 3600
    allow-credentials: true

# Token配置（门户服务专用）
token:
  header: X-Portal-Token
  secret: abcdefghijklmnopqrstuvwxyz_portal_service_2026
  expireTime: 720

# MyBatis配置
mybatis:
  typeAliasesPackage: com.ruoyi.**.domain
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  configLocation: classpath:mybatis/mybatis-config.xml

# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Springdoc配置（生产环境建议关闭）
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    group-configs:
    - group: 'portal-service'
      display-name: '门户服务接口'
      paths-to-match: '/**'
      packages-to-scan: com.ruoyi.service.controller

# 防止XSS攻击
xss:
  enabled: true
  excludes: /portal/*,/open/*
  urlPatterns: /*

# 用户配置
user:
  password:
    maxRetryCount: 5
    lockTime: 10
